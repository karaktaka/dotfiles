gui:
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#45475a'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
    searchingActiveBorderColor:
      - '#f9e2af'

customCommands:
  - key: 'G'
    context: 'files'
    command: 'git gen-commit'
    loadingText: 'Generating commit message'
    description: 'Generate a commit message with ollama based on the staged diff'
    output: terminal

git:
  parseEmoji: true

services:
  'gitlab.example.com': 'gitlab:gitlab.example.com'

