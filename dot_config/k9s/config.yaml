k9s:
  liveViewAutoRefresh: false
  refreshRate: 2
  maxConnRetry: 5
  readOnly: false
  noExitOnCtrlC: false
  shellPod:
    image: busybox:1.35.0
    namespace: default
    limits:
      cpu: 100m
      memory: 100Mi
  skipLatestRevCheck: false
  logger:
    tail: 1000
    buffer: 10000
    sinceSeconds: -1
    textWrap: false
    showTime: false
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
  screenDumpDir: /var/folders/jv/_0v8_71506bdj651kdxq_jmm7d83d1/T/k9s-screens-dennis.bernardy
  disablePodCounting: false
  ui:
    skin: catppuccin-mocha
    reactive: true
    enableMouse: false
  imageScans:
    enable: false
